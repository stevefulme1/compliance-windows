---
- name: "Scan Windows Server DISA STIG compliance (audit-only)"
  hosts: "{{ compliance_target_hosts | default('windows') }}"
  gather_facts: true
  check_mode: true

  vars:
    windows_manage_stig_generate_report: true
    windows_manage_stig_report_in_check_mode: true
    windows_manage_stig_fail_on_non_compliance: false

  tasks:
    - name: Run STIG compliance scan
      ansible.builtin.include_role:
        name: infra.windows_ops.windows_manage_stig
      vars:
        windows_manage_stig_skip_rules: "{{ compliance_skip_rules | default([]) }}"
        windows_manage_stig_only_rules: "{{ compliance_only_rules | default([]) }}"

    - name: Normalize findings to CFF
      ansible.builtin.include_role:
        name: security.compliance_windows.normalize_stig_findings
      vars:
        normalize_stig_findings_source_results: "{{ windows_manage_stig_results | default([]) }}"
        normalize_stig_findings_scan_id: "{{ compliance_scan_id | default(ansible_date_time.iso8601_basic_short) }}"

    - name: Push results to backend
      ansible.builtin.include_tasks:
        file: tasks/push_results.yml
      vars:
        push_results_cff_output: "{{ normalize_stig_findings_cff_output }}"
        push_results_cff_summary: "{{ normalize_stig_findings_cff_summary }}"
      when: compliance_results_backend | default('file') != 'file'
