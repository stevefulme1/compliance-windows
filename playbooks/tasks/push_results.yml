---
- name: Push results to Backstage API
  ansible.builtin.uri:
    url: "{{ compliance_backstage_url }}/api/compliance/scans/{{ compliance_scan_id }}/findings"
    method: POST
    headers:
      Authorization: "Bearer {{ compliance_backstage_token }}"
      Content-Type: application/json
    body: "{{ compliance_cff_output | to_json }}"
    body_format: json
    status_code: [200, 201]
  delegate_to: localhost
  run_once: true
  no_log: true
  when: compliance_results_backend == 'api'

- name: Push results to Controller job artifacts
  ansible.builtin.set_stats:
    data:
      compliance_findings: "{{ compliance_cff_output }}"
      compliance_summary: "{{ compliance_cff_summary }}"
  when: compliance_results_backend == 'artifacts'
