---
- name: "Verify Windows Server DISA STIG compliance after remediation"
  hosts: "{{ compliance_target_hosts | default('windows') }}"
  gather_facts: true
  check_mode: true

  vars:
    windows_manage_stig_generate_report: true
    windows_manage_stig_report_in_check_mode: true

  tasks:
    - name: Re-scan STIG compliance
      ansible.builtin.include_role:
        name: infra.windows_ops.windows_manage_stig
      vars:
        windows_manage_stig_skip_rules: "{{ compliance_skip_rules | default([]) }}"
        windows_manage_stig_only_rules: "{{ compliance_only_rules | default([]) }}"

    - name: Normalize verification findings to CFF
      ansible.builtin.include_role:
        name: security.compliance_windows.normalize_stig_findings
      vars:
        normalize_stig_source_results: "{{ windows_manage_stig_results | default([]) }}"
        normalize_stig_scan_id: "{{ compliance_scan_id | default(ansible_date_time.iso8601_basic_short) }}"
        normalize_stig_scan_type: verification

    - name: Assert compliance threshold met
      ansible.builtin.assert:
        that:
          - normalize_stig_findings_cff_summary.pass_rate >= (compliance_threshold | default(95) | float)
        fail_msg: >-
          Compliance score {{ normalize_stig_findings_cff_summary.pass_rate }}% is below
          threshold {{ compliance_threshold | default(95) }}%
      when: compliance_enforce_threshold | default(false) | bool
