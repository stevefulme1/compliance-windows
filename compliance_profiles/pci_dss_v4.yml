---
framework: PCI-DSS
version: "4.0"
title: "PCI DSS v4.0 — Windows Server Technical Controls"
description: >-
  Maps PCI Data Security Standard v4.0 requirements to CIS Benchmark
  and DISA STIG controls for Windows Server.

controls:
  - id: "2.2.1"
    title: "System Hardening Standards"
    description: "Configuration standards for all system components are developed, implemented, and maintained."
    cis_rules:
      - "1.1.1"
      - "1.1.2"
      - "1.1.3"
      - "1.1.4"
      - "1.1.5"
      - "1.1.6"
      - "2.3.1.1"
      - "2.3.1.2"
    stig_rules:
      - "V-254239"
      - "V-254240"
      - "V-254241"
      - "V-254243"

  - id: "2.2.2"
    title: "Vendor Default Accounts"
    description: "Vendor default accounts are managed and removed or disabled before a system is installed on the network."
    cis_rules:
      - "1.1.1"
      - "2.3.1.1"
      - "2.3.1.2"
    stig_rules:
      - "V-254243"
      - "V-254244"

  - id: "2.2.4"
    title: "Unnecessary Services"
    description: "Only necessary services, protocols, daemons, and functions are enabled."
    cis_rules:
      - "5.1"
      - "5.2"
      - "5.3"
      - "5.4"
      - "5.5"
      - "5.6"
    stig_rules:
      - "V-254386"

  - id: "2.2.7"
    title: "Non-Console Administrative Access Encryption"
    description: "All non-console administrative access is encrypted using strong cryptography."
    cis_rules:
      - "18.4.1"
      - "18.4.2"
      - "18.10.56.3.3.1"
      - "18.10.56.3.3.2"
    stig_rules:
      - "V-254372"
      - "V-254373"
      - "V-254358"

  - id: "5.2.1"
    title: "Anti-Malware Deployed"
    description: "An anti-malware solution is deployed on all system components."
    cis_rules:
      - "18.10.43.1"
      - "18.10.43.5.1"
      - "18.10.43.6.1"
      - "18.10.43.7.1"
      - "18.10.43.10.1"
      - "18.10.43.12.1"
      - "18.10.43.13.1"
    stig_rules:
      - "V-254474"

  - id: "5.3.4"
    title: "Audit Log Review"
    description: "Anti-malware audit logs are retained and regularly reviewed."
    cis_rules:
      - "18.10.43.12.1"
    stig_rules: []

  - id: "8.3.1"
    title: "User Authentication"
    description: "All user access to system components is authenticated with at least one authentication factor."
    cis_rules:
      - "1.1.1"
      - "1.1.2"
      - "1.1.3"
    stig_rules:
      - "V-254239"
      - "V-254240"

  - id: "8.3.4"
    title: "Lockout After Invalid Attempts"
    description: "Invalid authentication attempts are limited by locking out the user ID after not more than 10 attempts."
    cis_rules:
      - "1.2.1"
      - "1.2.2"
      - "1.2.3"
    stig_rules:
      - "V-254241"

  - id: "8.3.6"
    title: "Password Complexity"
    description: "Passwords/passphrases meet minimum complexity requirements."
    cis_rules:
      - "1.1.4"
      - "1.1.5"
      - "1.1.6"
    stig_rules:
      - "V-254240"
      - "V-254244"

  - id: "8.3.9"
    title: "Password Reuse"
    description: "Passwords/passphrases cannot be the same as the last four passwords used."
    cis_rules:
      - "1.1.1"
    stig_rules:
      - "V-254239"

  - id: "8.6.1"
    title: "Interactive Login for Service Accounts"
    description: "If accounts used by systems or services can be used for interactive login, they are managed as follows."
    cis_rules:
      - "2.3.1.1"
    stig_rules:
      - "V-254243"

  - id: "10.2.1"
    title: "Audit Logs Enabled"
    description: "Audit logs are enabled and active for all system components and cardholder data."
    cis_rules:
      - "17.1.1"
      - "17.1.2"
      - "17.2.1"
      - "17.2.2"
      - "17.2.3"
      - "17.2.4"
      - "17.2.5"
      - "17.3.1"
      - "17.3.2"
      - "17.5.1"
      - "17.5.2"
      - "17.5.3"
      - "17.5.4"
      - "17.5.5"
      - "17.5.6"
      - "17.6.1"
      - "17.6.2"
      - "17.6.3"
      - "17.6.4"
      - "17.7.1"
      - "17.7.2"
      - "17.7.3"
      - "17.7.4"
      - "17.7.5"
      - "17.8.1"
      - "17.9.1"
      - "17.9.2"
      - "17.9.3"
      - "17.9.4"
      - "17.9.5"
    stig_rules:
      - "V-254318"
      - "V-254319"
      - "V-254320"
      - "V-254321"
      - "V-254322"
      - "V-254323"

  - id: "10.2.1.2"
    title: "Audit Administrative Actions"
    description: "Audit logs capture all actions taken by any individual with administrative access."
    cis_rules:
      - "17.2.1"
      - "17.2.2"
      - "17.5.1"
      - "17.5.2"
    stig_rules:
      - "V-254319"
      - "V-254320"

  - id: "10.2.1.5"
    title: "Audit Privilege Changes"
    description: "Audit logs capture all changes to identification and authentication credentials."
    cis_rules:
      - "17.2.5"
      - "17.6.1"
      - "17.6.2"
    stig_rules:
      - "V-254322"
      - "V-254323"

  - id: "10.3.1"
    title: "Audit Log Retention"
    description: "Read access to audit logs is limited to those with a job-related need."
    cis_rules:
      - "18.10.26.1.1"
      - "18.10.26.1.2"
    stig_rules:
      - "V-254324"

  - id: "10.5.1"
    title: "Retain Audit Logs 12 Months"
    description: "Retain audit log history for at least 12 months, with at least three months immediately available."
    cis_rules: []
    stig_rules: []
    gap: true
    gap_note: "Log retention is typically enforced by a central log management system, not local Windows policy."

  - id: "11.5.2"
    title: "File Integrity Monitoring"
    description: "A change-detection mechanism is deployed to alert personnel to unauthorized modification of critical system files."
    cis_rules: []
    stig_rules: []
    gap: true
    gap_note: "FIM requires a dedicated agent (AIDE, Tripwire, Wazuh). No native Windows GPO control."
