---
- name: Load rule definitions
  ansible.builtin.include_vars:
    dir: "{{ compliance_evaluate_rules_path }}"
    name: compliance_rules
  delegate_to: localhost
  tags:
    - evaluate

- name: Evaluate gathered facts against rules
  ansible.builtin.set_fact:
    compliance_evaluate_results: >-
      {{
        compliance_rules.rules | default([])
        | map('security.compliance_windows.evaluate_rule', compliance_evaluate_gathered_facts)
        | list
      }}
  delegate_to: localhost
  tags:
    - evaluate

- name: Build CFF output from evaluation
  ansible.builtin.set_fact:
    compliance_evaluate_cff_output:
      schema_version: "1.0.0"
      scan_id: "{{ compliance_scan_id | default(ansible_date_time.iso8601_basic_short) }}"
      scan_type: "pre-assessment"
      framework: "{{ compliance_evaluate_framework }}"
      target_host: "{{ inventory_hostname }}"
      scan_timestamp: "{{ ansible_date_time.iso8601 }}"
      findings: "{{ compliance_evaluate_results }}"
  delegate_to: localhost
  tags:
    - evaluate
