---
argument_specs:
  main:
    short_description: Evaluate gathered facts against rule definitions on localhost
    options:
      compliance_evaluate_gathered_facts:
        description: Gathered compliance data from compliance_gather role
        type: dict
        required: true
      compliance_evaluate_rules_path:
        description: Path to directory containing rule definition YAML files
        type: path
        required: true
      compliance_evaluate_framework:
        description: Compliance framework identifier
        type: str
        default: DISA_STIG
        choices:
          - DISA_STIG
          - CIS
