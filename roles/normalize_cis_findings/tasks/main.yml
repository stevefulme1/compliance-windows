---
- name: Build CFF document from CIS results
  ansible.builtin.set_fact:
    compliance_cff_output:
      schema_version: "1.0.0"
      scan_id: "{{ normalize_cis_scan_id }}"
      scan_type: "{{ normalize_cis_scan_type }}"
      framework: "{{ normalize_cis_framework }}"
      benchmark: "{{ windows_manage_cis_benchmark_name | default('CIS Benchmark') }}"
      benchmark_version: "{{ windows_manage_cis_benchmark_version | default('unknown') }}"
      target_host: "{{ inventory_hostname }}"
      target_os: "Windows Server {{ ansible_distribution_version | default('unknown') }}"
      scan_timestamp: "{{ ansible_date_time.iso8601 }}"
      findings: >-
        {{
          normalize_cis_source_results | default([]) | map('security.compliance_windows.to_cff_cis') | list
        }}
  tags:
    - normalize

- name: Compute CFF summary statistics
  ansible.builtin.set_fact:
    compliance_cff_summary:
      total: "{{ compliance_cff_output.findings | length }}"
      passed: "{{ compliance_cff_output.findings | selectattr('status', 'equalto', 'pass') | list | length }}"
      failed: "{{ compliance_cff_output.findings | selectattr('status', 'equalto', 'fail') | list | length }}"
      not_checked: "{{ compliance_cff_output.findings | selectattr('status', 'equalto', 'notchecked') | list | length }}"
      pass_rate: >-
        {{
          ((compliance_cff_output.findings | selectattr('status', 'equalto', 'pass') | list | length)
          / (compliance_cff_output.findings | length | int)) * 100
          if (compliance_cff_output.findings | length | int) > 0 else 0
        }}
  tags:
    - normalize

- name: Write CFF JSON to output path
  ansible.windows.win_copy:
    content: "{{ compliance_cff_output | to_nice_json }}"
    dest: "{{ normalize_cis_output_path }}/cff-cis-{{ normalize_cis_scan_id }}.json"
  check_mode: false
  tags:
    - normalize
    - reporting
