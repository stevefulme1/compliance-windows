---
- name: Build CFF document
  ansible.builtin.set_fact:
    normalize_stig_findings_cff_output:
      schema_version: "1.0.0"
      scan_id: "{{ normalize_stig_findings_scan_id }}"
      scan_type: "{{ normalize_stig_findings_scan_type }}"
      framework: "{{ normalize_stig_findings_framework }}"
      benchmark: "{{ windows_manage_stig_benchmark_name | default('DISA STIG') }}"
      benchmark_version: "{{ windows_manage_stig_benchmark_version | default('unknown') }}"
      target_host: "{{ inventory_hostname }}"
      target_os: "Windows Server {{ ansible_distribution_version | default('unknown') }}"
      scan_timestamp: "{{ ansible_date_time.iso8601 }}"
      findings: >-
        {{
          normalize_stig_findings_source_results | default([]) | map('security.compliance_windows.to_cff_stig') | list
        }}
  tags:
    - normalize

- name: Compute CFF summary statistics
  ansible.builtin.set_fact:
    normalize_stig_findings_cff_summary:
      total: "{{ normalize_stig_findings_cff_output.findings | length }}"
      passed: "{{ normalize_stig_findings_cff_output.findings | selectattr('status', 'equalto', 'pass') | list | length }}"
      failed: "{{ normalize_stig_findings_cff_output.findings | selectattr('status', 'equalto', 'fail') | list | length }}"
      not_checked: "{{ normalize_stig_findings_cff_output.findings | selectattr('status', 'equalto', 'notchecked') | list | length }}"
      pass_rate: >-
        {{
          ((normalize_stig_findings_cff_output.findings | selectattr('status', 'equalto', 'pass') | list | length)
          / (normalize_stig_findings_cff_output.findings | length | int)) * 100
          if (normalize_stig_findings_cff_output.findings | length | int) > 0 else 0
        }}
  tags:
    - normalize

- name: Write CFF JSON to output path
  ansible.windows.win_copy:
    content: "{{ normalize_stig_findings_cff_output | to_nice_json }}"
    dest: "{{ normalize_stig_findings_output_path }}/cff-stig-{{ normalize_stig_findings_scan_id }}.json"
  check_mode: false
  tags:
    - normalize
    - reporting
