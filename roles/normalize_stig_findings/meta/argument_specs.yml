---
argument_specs:
  main:
    short_description: Normalize STIG results to Common Findings Format
    options:
      normalize_stig_source_results:
        description: Raw STIG scan results from infra.windows_ops
        type: list
        elements: dict
        required: true
      normalize_stig_scan_id:
        description: Unique identifier for this scan
        type: str
        required: true
      normalize_stig_scan_type:
        description: Type of scan operation
        type: str
        default: scan
        choices:
          - scan
          - verification
      normalize_stig_output_path:
        description: Directory path for CFF JSON output
        type: path
        default: /tmp/compliance/cff
      normalize_stig_framework:
        description: Compliance framework identifier
        type: str
        default: DISA_STIG
